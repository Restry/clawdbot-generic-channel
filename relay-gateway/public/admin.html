<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Relay Gateway Admin</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: "#142132",
              sand: "#f8f3ea",
              pine: "#0f766e",
              ember: "#b45309",
              dusk: "#273446",
            },
            boxShadow: {
              float: "0 18px 48px rgba(20, 33, 50, 0.10)",
            },
            fontFamily: {
              sans: [
                "Avenir Next",
                "Segoe UI",
                "PingFang SC",
                "Hiragino Sans GB",
                "Microsoft YaHei",
                "sans-serif",
              ],
              mono: [
                "IBM Plex Mono",
                "JetBrains Mono",
                "SFMono-Regular",
                "ui-monospace",
                "monospace",
              ],
            },
          },
        },
      };
    </script>
    <style>
      body {
        background:
          radial-gradient(circle at 0 0, rgba(180, 83, 9, 0.14), transparent 24rem),
          radial-gradient(circle at 100% 0, rgba(15, 118, 110, 0.12), transparent 28rem),
          linear-gradient(180deg, #fcfaf6 0%, #f5ede1 100%);
      }
    </style>
  </head>
  <body class="min-h-screen bg-sand text-ink antialiased">
    <div id="app"></div>

    <script type="module">
      import React, { useEffect, useState } from "https://esm.sh/react@19.2.0";
      import { createRoot } from "https://esm.sh/react-dom@19.2.0/client";
      import htm from "https://esm.sh/htm@3.1.1";

      const html = htm.bind(React.createElement);
      const STORAGE_KEY = "relay-admin-token";
      const TAB_CONNECT = "connect";
      const TAB_USERS = "users";
      const TAB_SETTINGS = "settings";
      const TAB_ACTIVITY = "activity";

      function randomToken() {
        if (globalThis.crypto?.randomUUID) {
          return globalThis.crypto.randomUUID().replaceAll("-", "");
        }
        if (globalThis.crypto?.getRandomValues) {
          const bytes = new Uint8Array(16);
          globalThis.crypto.getRandomValues(bytes);
          return Array.from(bytes, (value) => value.toString(16).padStart(2, "0")).join("");
        }
        return `${Date.now().toString(16)}${Math.random().toString(16).slice(2)}`
          .replaceAll(".", "")
          .slice(0, 32);
      }

      function createChannelDraft(channel) {
        return {
          channelId: channel?.channelId || "",
          label: channel?.label || "",
          secret: channel?.secret || "",
          tokenParam: channel?.tokenParam || "token",
        };
      }

      function createUserDraft(user) {
        return {
          id: user?.id || "",
          senderId: user?.senderId || "",
          chatId: user?.chatId || "",
          token: user?.token || `gc_${randomToken()}`,
          allowAgents: Array.isArray(user?.allowAgents) ? user.allowAgents.join(",") : "",
          enabled: user?.enabled === false ? false : true,
        };
      }

      function formatTime(value) {
        if (!value) {
          return "Never";
        }
        try {
          return new Date(value).toLocaleString();
        } catch {
          return String(value);
        }
      }

      function summarizeLastSeen(channel) {
        if (!channel) {
          return "Never";
        }
        if (channel.backendConnected && channel.lastConnectedAt) {
          return formatTime(channel.lastConnectedAt);
        }
        return formatTime(channel.lastDisconnectedAt || channel.lastConnectedAt);
      }

      function normalizeHttpOrigin(value) {
        if (!value) {
          return window.location.origin;
        }
        try {
          return new URL(value).origin;
        } catch {
          return window.location.origin;
        }
      }

      function getPublicHttpOrigin(gatewayState) {
        return normalizeHttpOrigin(gatewayState?.publicBaseUrl);
      }

      function getPublicWsOrigin(gatewayState) {
        const origin = new URL(getPublicHttpOrigin(gatewayState));
        origin.protocol = origin.protocol === "https:" ? "wss:" : "ws:";
        return origin.origin;
      }

      function getPublicAdminUrl(gatewayState) {
        return `${getPublicHttpOrigin(gatewayState)}/admin`;
      }

      function buildClientBaseUrl(gatewayState, channel) {
        const channelId = channel?.channelId || "<channel-id>";
        return `${getPublicWsOrigin(gatewayState)}/client?channelId=${encodeURIComponent(channelId)}`;
      }

      function buildClientFullUrl(gatewayState, channel, user) {
        const tokenParam = channel.tokenParam || "token";
        const token = user?.token || "<user-token>";
        return `${buildClientBaseUrl(gatewayState, channel)}&${encodeURIComponent(tokenParam)}=${encodeURIComponent(token)}`;
      }

      function buildPluginBackendUrl(gatewayState) {
        return gatewayState?.pluginBackendUrl || "ws://127.0.0.1:18080/backend";
      }

      function buildRelayBlock(gatewayState, channel) {
        const channelId = channel?.channelId || "<channel-id>";
        const secret = channel?.secret || "<backend-secret>";
        return [
          'connectionMode: "relay"',
          "relay:",
          `  url: "${buildPluginBackendUrl(gatewayState)}"`,
          `  channelId: "${channelId}"`,
          `  secret: "${secret}"`,
        ].join("\n");
      }

      function buildOpenClawConfig(gatewayState, channel) {
        const channelId = channel?.channelId || "<channel-id>";
        const secret = channel?.secret || "<backend-secret>";
        return [
          "channels:",
          "  generic-channel:",
          "    enabled: true",
          '    connectionMode: "relay"',
          "    relay:",
          `      url: "${buildPluginBackendUrl(gatewayState)}"`,
          `      channelId: "${channelId}"`,
          `      secret: "${secret}"`,
          '      instanceId: "openclaw-node-1"',
          "    auth:",
          "      enabled: false",
        ].join("\n");
      }

      function pickPreferredUser(channel, selectedUserSenderId) {
        const users = Array.isArray(channel?.users) ? channel.users : [];
        if (users.length === 0) {
          return null;
        }
        return (
          users.find((item) => item.senderId === selectedUserSenderId) ||
          users.find((item) => item.enabled !== false) ||
          users[0]
        );
      }

      function buildClientPreset(gatewayState, channel, user) {
        return {
          serverUrl: buildClientBaseUrl(gatewayState, channel),
          token: user?.token || "<create-user-token-first>",
          userName: user?.senderId || "your-user-name",
          chatId: user?.chatId || "<optional, can stay empty>",
          agentId:
            Array.isArray(user?.allowAgents) && user.allowAgents.length > 0
              ? user.allowAgents[0]
              : "main",
        };
      }

      function buildClientTemplate(gatewayState, channel, user) {
        const preset = buildClientPreset(gatewayState, channel, user);
        return [
          `serverUrl = "${preset.serverUrl}"`,
          `userName = "${preset.userName}"`,
          `token = "${preset.token}"`,
          "",
          "# optional",
          `chatId = "${preset.chatId}"`,
          `agentId = "${preset.agentId}"`,
        ].join("\n");
      }

      function buildClientGuide(gatewayState, channel, user) {
        const preset = buildClientPreset(gatewayState, channel, user);
        return [
          {
            key: "serverUrl",
            value: preset.serverUrl,
            note: "填到 H5 的 serverUrl。这里故意只保留 channelId，让 token 单独填，方便更换用户。",
          },
          {
            key: "token",
            value: preset.token,
            note: user ? `使用 ${user.senderId} 的网关 token。` : "先在用户管理里创建一个 token，再填到这里。",
          },
          {
            key: "userName",
            value: preset.userName,
            note: "通常与 senderId 相同。聊天窗口里看到的发送者名称就是它。",
          },
          {
            key: "chatId",
            value: preset.chatId,
            note: "可以留空。连上之后，客户端仍可自由切换或新建会话。",
          },
          {
            key: "agentId",
            value: preset.agentId,
            note: "可选。如果这个用户限制了 agent，第一次接入建议先填一个允许的 agentId。",
          },
        ];
      }

      function buildClientGuideText(gatewayState, channel, user) {
        return buildClientGuide(gatewayState, channel, user)
          .map((item) => `${item.key}: ${item.value}`)
          .join("\n");
      }

      function buildSetupChecklist(gatewayState, channel) {
        return [
          {
            label: "Public TLS",
            ok: getPublicHttpOrigin(gatewayState).startsWith("https://"),
            hint: getPublicHttpOrigin(gatewayState),
          },
          {
            label: "Backend online",
            ok: Boolean(channel?.backendConnected),
            hint: channel?.backendConnected ? `Instance ${channel.instanceId || "-"}` : "Plugin still needs to connect back",
          },
          {
            label: "User tokens",
            ok: (channel?.userCount || 0) > 0,
            hint: `${channel?.userCount || 0} managed users`,
          },
          {
            label: "H5 compatible",
            ok: (channel?.tokenParam || "token") === "token",
            hint: `tokenParam = ${channel?.tokenParam || "token"}`,
          },
        ];
      }

      async function copyText(value) {
        if (!value) {
          throw new Error("Nothing to copy");
        }
        if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(value);
          return;
        }
        const input = document.createElement("textarea");
        input.value = value;
        input.setAttribute("readonly", "");
        input.style.position = "fixed";
        input.style.opacity = "0";
        document.body.appendChild(input);
        input.select();
        document.execCommand("copy");
        input.remove();
      }

      async function requestJson(path, adminToken, init = {}) {
        const headers = new Headers(init.headers || {});
        if (init.body && !headers.has("content-type")) {
          headers.set("content-type", "application/json");
        }
        if (adminToken) {
          headers.set("x-relay-admin-token", adminToken);
        }

        const response = await fetch(path, {
          ...init,
          headers,
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(data.error || `HTTP ${response.status}`);
        }
        return data;
      }

      function toneClasses(tone) {
        if (tone === "ok") {
          return "bg-emerald-50 text-emerald-700 ring-emerald-200";
        }
        if (tone === "warn") {
          return "bg-amber-50 text-amber-800 ring-amber-200";
        }
        if (tone === "danger") {
          return "bg-rose-50 text-rose-700 ring-rose-200";
        }
        return "bg-slate-100 text-slate-700 ring-slate-200";
      }

      function Button({ tone = "primary", className = "", type = "button", ...props }) {
        const toneClass =
          tone === "primary"
            ? "bg-dusk text-white hover:bg-slate-900"
            : tone === "secondary"
              ? "bg-white text-slate-900 ring-1 ring-inset ring-slate-200 hover:bg-slate-50"
              : tone === "ghost"
                ? "bg-slate-100 text-slate-700 hover:bg-slate-200"
                : "bg-rose-50 text-rose-700 ring-1 ring-inset ring-rose-200 hover:bg-rose-100";

        return html`
          <button
            ...${props}
            type=${type}
            className=${`inline-flex items-center justify-center rounded-2xl px-4 py-2.5 text-sm font-semibold transition ${toneClass} ${className}`.trim()}
          />
        `;
      }

      function Chip({ tone = "slate", children, className = "" }) {
        return html`
          <span className=${`inline-flex items-center rounded-full px-3 py-1 text-xs font-semibold ring-1 ring-inset ${toneClasses(tone)} ${className}`.trim()}>
            ${children}
          </span>
        `;
      }

      function Card({ className = "", children }) {
        return html`
          <div className=${`rounded-[26px] border border-white/70 bg-white/85 shadow-float backdrop-blur ${className}`.trim()}>
            ${children}
          </div>
        `;
      }

      function SectionCard({ title, subtitle, actions = null, children, className = "" }) {
        return html`
          <${Card} className=${`p-5 ${className}`.trim()}>
            <div className="mb-4 flex items-start justify-between gap-3">
              <div className="space-y-1">
                <h2 className="text-lg font-semibold text-slate-950">${title}</h2>
                ${subtitle ? html`<p className="text-sm leading-6 text-slate-500">${subtitle}</p>` : null}
              </div>
              ${actions}
            </div>
            ${children}
          </${Card}>
        `;
      }

      function EmptyState({ title, text, action = null }) {
        return html`
          <div className="grid min-h-[220px] place-items-center rounded-[24px] border border-dashed border-slate-200 bg-slate-50/70 px-6 py-10 text-center">
            <div className="max-w-md space-y-3">
              <div className="text-xl font-semibold text-slate-950">${title}</div>
              <p className="text-sm leading-7 text-slate-500">${text}</p>
              ${action}
            </div>
          </div>
        `;
      }

      function TabButton({ active, label, onClick }) {
        return html`
          <button
            type="button"
            onClick=${onClick}
            className=${`rounded-2xl px-4 py-2.5 text-sm font-semibold transition ${
              active
                ? "bg-slate-900 text-white"
                : "bg-white text-slate-600 ring-1 ring-inset ring-slate-200 hover:bg-slate-50"
            }`}
          >
            ${label}
          </button>
        `;
      }

      function getQueryAdminToken() {
        return new URLSearchParams(window.location.search).get("adminToken")?.trim() || "";
      }

      function getInitialAdminToken() {
        return getQueryAdminToken() || localStorage.getItem(STORAGE_KEY) || "";
      }

      function App() {
        const initialToken = getInitialAdminToken();
        const [adminToken, setAdminToken] = useState(initialToken);
        const [adminInput, setAdminInput] = useState(initialToken);
        const [showAdminToken, setShowAdminToken] = useState(false);
        const [gatewayState, setGatewayState] = useState(null);
        const [isLoading, setIsLoading] = useState(false);
        const [errorMessage, setErrorMessage] = useState("");
        const [selectedChannelId, setSelectedChannelId] = useState("");
        const [selectedUserSenderId, setSelectedUserSenderId] = useState("");
        const [activeTab, setActiveTab] = useState(TAB_CONNECT);
        const [serverSearch, setServerSearch] = useState("");
        const [userSearch, setUserSearch] = useState("");
        const [showChannelEditor, setShowChannelEditor] = useState(false);
        const [showUserEditor, setShowUserEditor] = useState(false);
        const [editingUserSenderId, setEditingUserSenderId] = useState("");
        const [channelDraft, setChannelDraft] = useState(createChannelDraft());
        const [userDraft, setUserDraft] = useState(createUserDraft());
        const [activity, setActivity] = useState([]);
        const [toasts, setToasts] = useState([]);

        const channels = Array.isArray(gatewayState?.channels) ? gatewayState.channels : [];
        const filteredChannels = channels
          .filter((channel) => {
            const query = serverSearch.trim().toLowerCase();
            if (!query) {
              return true;
            }
            return [
              channel.channelId,
              channel.label,
              channel.backendConnected ? "online" : "offline",
              channel.userCount > 0 ? "protected" : "open",
              channel.instanceId,
            ]
              .filter(Boolean)
              .join(" ")
              .toLowerCase()
              .includes(query);
          })
          .sort((left, right) => {
            if (left.channelId === selectedChannelId) {
              return -1;
            }
            if (right.channelId === selectedChannelId) {
              return 1;
            }
            if (left.backendConnected !== right.backendConnected) {
              return left.backendConnected ? -1 : 1;
            }
            return (left.label || left.channelId).localeCompare(right.label || right.channelId);
          });

        const selectedChannel = channels.find((channel) => channel.channelId === selectedChannelId) || null;
        const isDraftChannel = !selectedChannel && showChannelEditor;
        const workspaceChannel =
          selectedChannel ||
          (isDraftChannel
            ? {
                channelId: channelDraft.channelId.trim(),
                label: channelDraft.label.trim(),
                secret: channelDraft.secret.trim(),
                tokenParam: channelDraft.tokenParam.trim() || "token",
                users: [],
                userCount: 0,
                clientCount: 0,
                backendConnected: false,
                instanceId: "",
              }
            : null);
        const preferredUser = pickPreferredUser(selectedChannel, selectedUserSenderId);
        const filteredUsers = (Array.isArray(selectedChannel?.users) ? selectedChannel.users : [])
          .filter((user) => {
            const query = userSearch.trim().toLowerCase();
            if (!query) {
              return true;
            }
            return [
              user.senderId,
              user.id,
              user.chatId,
              user.token,
              Array.isArray(user.allowAgents) ? user.allowAgents.join(",") : "",
              user.enabled === false ? "disabled" : "enabled",
            ]
              .filter(Boolean)
              .join(" ")
              .toLowerCase()
              .includes(query);
          })
          .sort((left, right) => {
            if ((left.enabled === false) !== (right.enabled === false)) {
              return left.enabled === false ? 1 : -1;
            }
            return left.senderId.localeCompare(right.senderId);
          });

        const summary = {
          channels: channels.length,
          protectedChannels: channels.filter((channel) => channel.userCount > 0).length,
          backendsOnline: gatewayState?.stats?.backendCount || 0,
          backendsOffline: channels.filter((channel) => !channel.backendConnected).length,
          clientCount: gatewayState?.stats?.clientCount || 0,
          userCount: channels.reduce((sum, channel) => sum + (channel.userCount || 0), 0),
        };

        const nextAction = isDraftChannel
          ? "正在创建一个新服务器草稿。先填好 channelId 和 secret，再决定是否立刻分配用户 token。"
          : !selectedChannel
            ? "先从左边选择一个服务器，或者新建一个 channel。"
          : !selectedChannel.backendConnected
            ? "当前最重要的是让 OpenClaw 插件连回本机 backend，这样客户端才不会被拒绝。"
            : selectedChannel.userCount === 0
              ? "先为这个服务器创建至少一个用户 token，再把客户端字段说明发给第三方。"
              : (selectedChannel.tokenParam || "token") !== "token"
                ? "如果第三方直接接官方 H5 页，建议把 tokenParam 改回 token。"
                : "当前配置已经适合日常接入，重点是把正确用户的 client guide 发给第三方。";

        useEffect(() => {
          if (!selectedChannelId && showChannelEditor) {
            return;
          }
          if (!channels.length) {
            if (selectedChannelId) {
              setSelectedChannelId("");
            }
            return;
          }
          if (selectedChannelId && channels.some((item) => item.channelId === selectedChannelId)) {
            return;
          }
          setSelectedChannelId(channels[0].channelId);
        }, [channels, selectedChannelId]);

        useEffect(() => {
          if (!selectedChannel) {
            setChannelDraft(createChannelDraft());
            setSelectedUserSenderId("");
            return;
          }
          setChannelDraft(createChannelDraft(selectedChannel));
          const nextUser = pickPreferredUser(selectedChannel, selectedUserSenderId);
          if ((nextUser?.senderId || "") !== selectedUserSenderId) {
            setSelectedUserSenderId(nextUser?.senderId || "");
          }
        }, [selectedChannel?.channelId, gatewayState?.timestamp]);

        useEffect(() => {
          if (!showUserEditor) {
            return;
          }
          const editingUser = Array.isArray(selectedChannel?.users)
            ? selectedChannel.users.find((item) => item.senderId === editingUserSenderId)
            : null;
          setUserDraft(createUserDraft(editingUser || null));
        }, [showUserEditor, editingUserSenderId, selectedChannel?.channelId, gatewayState?.timestamp]);

        useEffect(() => {
          const queryToken = getQueryAdminToken();
          if (queryToken) {
            localStorage.setItem(STORAGE_KEY, queryToken);
          }
          if (initialToken) {
            loadState(false, initialToken);
            return;
          }
          loadMeta();
        }, []);

        function pushActivity(message, tone = "slate") {
          setActivity((current) => [
            { id: `${Date.now()}-${Math.random()}`, message, tone, time: Date.now() },
            ...current,
          ].slice(0, 14));
        }

        function pushToast(message, tone = "slate") {
          const id = `${Date.now()}-${Math.random()}`;
          setToasts((current) => [...current, { id, message, tone }]);
          window.setTimeout(() => {
            setToasts((current) => current.filter((item) => item.id !== id));
          }, 2800);
        }

        async function runAction(work, successMessage, errorPrefix) {
          try {
            setErrorMessage("");
            const result = await work();
            if (successMessage) {
              pushActivity(successMessage, "ok");
              pushToast(successMessage, "ok");
            }
            return result;
          } catch (error) {
            const message = `${errorPrefix}: ${String(error.message || error)}`;
            setErrorMessage(message);
            pushActivity(message, "danger");
            pushToast(message, "danger");
            throw error;
          }
        }

        async function loadState(announce = true, tokenOverride = undefined) {
          const token = tokenOverride ?? adminToken;
          setIsLoading(true);
          try {
            const data = await requestJson("/api/state", token);
            setGatewayState(data);
            setSelectedChannelId((current) => {
              if (current && data.channels.some((item) => item.channelId === current)) {
                return current;
              }
              return data.channels[0]?.channelId || "";
            });
            setErrorMessage("");
            if (announce) {
              pushActivity("Relay state refreshed.", "ok");
              pushToast("Relay state refreshed.", "ok");
            }
          } catch (error) {
            const message = String(error.message || error);
            if (message.includes("admin auth required")) {
              setGatewayState((current) =>
                current
                  ? {
                      ...current,
                      channels: [],
                      stats: {
                        backendCount: 0,
                        clientCount: 0,
                      },
                    }
                  : null,
              );
              setErrorMessage("Admin token required");
              if (announce) {
                pushActivity("Admin token required before state can be loaded.", "warn");
                pushToast("Admin token required.", "warn");
              }
              return;
            }
            setErrorMessage(message);
            if (announce) {
              pushActivity(message, "danger");
              pushToast(message, "danger");
            }
          } finally {
            setIsLoading(false);
          }
        }

        async function loadMeta() {
          try {
            const data = await requestJson("/api/meta", "");
            setGatewayState((current) => ({
              ...(current || {}),
              ...data,
              channels: Array.isArray(current?.channels) ? current.channels : [],
              stats: current?.stats || {
                backendCount: 0,
                clientCount: 0,
              },
            }));
            setErrorMessage(data.adminAuthEnabled ? "Admin token required" : "");
            if (!data.adminAuthEnabled) {
              await loadState(false, "");
            }
          } catch (error) {
            setErrorMessage(String(error.message || error));
          }
        }

        async function saveAdminToken(event) {
          event.preventDefault();
          const nextToken = adminInput.trim();
          localStorage.setItem(STORAGE_KEY, nextToken);
          setAdminToken(nextToken);
          pushActivity("Admin token saved locally.", "ok");
          pushToast("Admin token saved locally.", "ok");
          await loadState(false, nextToken);
        }

        function selectChannel(channelId) {
          setSelectedChannelId(channelId);
          setShowChannelEditor(false);
          setShowUserEditor(false);
          setEditingUserSenderId("");
          setActiveTab(TAB_CONNECT);
          pushActivity(`Selected ${channelId}.`, "ok");
        }

        function startNewChannel() {
          setSelectedChannelId("");
          setChannelDraft(createChannelDraft());
          setShowChannelEditor(true);
          setActiveTab(TAB_SETTINGS);
          pushActivity("Preparing a new server draft.", "ok");
          pushToast("Preparing a new server draft.", "ok");
        }

        function startEditServer() {
          setShowChannelEditor(true);
          setActiveTab(TAB_SETTINGS);
        }

        function startNewUser() {
          setEditingUserSenderId("");
          setUserDraft(createUserDraft());
          setShowUserEditor(true);
          setActiveTab(TAB_USERS);
        }

        function startEditUser(user) {
          setEditingUserSenderId(user.senderId);
          setUserDraft(createUserDraft(user));
          setShowUserEditor(true);
          setActiveTab(TAB_USERS);
          setSelectedUserSenderId(user.senderId);
        }

        async function submitChannel(event) {
          event.preventDefault();
          const payload = {
            channelId: channelDraft.channelId.trim(),
            label: channelDraft.label.trim(),
            secret: channelDraft.secret.trim(),
            tokenParam: channelDraft.tokenParam.trim() || "token",
          };

                                        <select
                                          className="rounded-2xl border-slate-200 bg-white px-4 py-3 text-sm"
                                          value=${preferredUser?.senderId || ""}
                                          disabled=${selectedChannel.userCount === 0}
                                          onChange=${(event) => {
                                            setSelectedUserSenderId(event.target.value);
                                            pushActivity(`Client guide switched to ${event.target.value || "no user"}.`, "ok");
                                            pushToast(`Client guide switched to ${event.target.value || "no user"}.`, "ok");
                                          }}
                                        >
                                          ${selectedChannel.userCount === 0
                                            ? html`<option value="">No users configured</option>`
                                            : selectedChannel.users.map((user) => html`
                                                <option value=${user.senderId}>
                                                  ${user.senderId}${user.enabled === false ? " (disabled)" : ""}
                                                </option>
                                              `)}
                                        </select>
                                      </label>

                                      <div className="mt-4 grid gap-3">
                                        ${buildClientGuide(gatewayState, selectedChannel, preferredUser).map((item) => html`
                                          <div className="rounded-[22px] border border-slate-200 bg-slate-50/80 p-4">
                                            <div className="text-[11px] font-semibold uppercase tracking-[0.16em] text-slate-400">${item.key}</div>
                                            <code className="mt-2 block overflow-auto rounded-2xl bg-white px-3 py-3 font-mono text-xs leading-6 text-slate-700">
                                              ${item.value}
                                            </code>
                                            <p className="mt-3 text-sm leading-6 text-slate-500">${item.note}</p>
                                          </div>
                                        `)}
                                      </div>

                                      <div className="mt-4 rounded-[22px] border border-slate-200 bg-slate-50/80 p-4">
                                        <div className="mb-2 flex items-center justify-between gap-3">
                                          <div className="text-sm font-semibold text-slate-900">Raw WSS URL</div>
                                          <${Button} tone="secondary" onClick=${() => handleCopy("raw client URL", buildClientFullUrl(gatewayState, selectedChannel, preferredUser))}>Copy</${Button}>
                                        </div>
                                        <code className="block overflow-auto rounded-2xl bg-white px-3 py-3 font-mono text-xs leading-6 text-slate-700">
                                          ${buildClientFullUrl(gatewayState, selectedChannel, preferredUser)}
                                        </code>
                                      </div>

                                      <div className="mt-4 rounded-[22px] border border-slate-200 bg-slate-50/80 p-4">
                                        <div className="mb-2 flex items-center justify-between gap-3">
                                          <div className="text-sm font-semibold text-slate-900">Full client template</div>
                                          <${Button} tone="secondary" onClick=${() => handleCopy("client template", buildClientTemplate(gatewayState, selectedChannel, preferredUser))}>Copy</${Button}>
                                        </div>
                                        <pre className="overflow-auto rounded-2xl bg-white px-3 py-3 font-mono text-xs leading-6 text-slate-700">${buildClientTemplate(gatewayState, selectedChannel, preferredUser)}</pre>
                                      </div>
                                    </div>
                                  </div>
                                </div>
                              </div>
                            ` : null}

                            ${activeTab === TAB_USERS ? html`
                              <div className="grid gap-4 2xl:grid-cols-[1.05fr_0.95fr]">
                                <div className="grid gap-4">
                                  <div className="rounded-[26px] border border-slate-200 bg-white/80 p-5">
                                    <div className="mb-4 flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
                                      <div>
                                        <div className="text-xs font-semibold uppercase tracking-[0.18em] text-slate-400">Users</div>
                                        <h3 className="mt-1 text-xl font-semibold text-slate-950">谁可以连这个服务器</h3>
                                        <p className="mt-2 text-sm leading-7 text-slate-500">
                                          这里按“用户粒度”维护 token。经常使用的动作应该是：搜索、复制 token、切换 guide、编辑用户。
                                        </p>
                                      </div>
                                      <div className="flex flex-wrap gap-2">
                                        <${Button} tone="secondary" onClick=${startNewUser}>New User</${Button}>
                                        <input
                                          className="w-full min-w-[220px] rounded-2xl border-slate-200 bg-white px-4 py-3 text-sm sm:w-auto"
                                          type="search"
                                          value=${userSearch}
                                          onInput=${(event) => setUserSearch(event.target.value)}
                                          placeholder="Search senderId, token, chatId..."
                                        />
                                      </div>
                                    </div>

                                    ${filteredUsers.length === 0
                                      ? html`<${EmptyState}
                                          title=${selectedChannel.userCount === 0 ? "No users yet" : "No users match"}
                                          text=${selectedChannel.userCount === 0
                                            ? "先创建一个 token，接入方就能开始按用户身份连接。"
                                            : "换一个关键词，或者清空搜索。"}
                                          action=${selectedChannel.userCount === 0 ? html`<${Button} onClick=${startNewUser}>Create First User</${Button}>` : null}
                                        />`
                                      : html`
                                          <div className="grid gap-3">
                                            ${filteredUsers.map((user) => {
                                              const active = preferredUser?.senderId === user.senderId;
                                              const agentLabel =
                                                Array.isArray(user.allowAgents) && user.allowAgents.length > 0
                                                  ? user.allowAgents.join(", ")
                                                  : "all agents";
                                              return html`
                                                <div className=${`rounded-[24px] border p-4 ${active ? "border-slate-900 bg-slate-900 text-white" : "border-slate-200 bg-slate-50/80"}`}>
                                                  <div className="flex flex-wrap items-start justify-between gap-3">
                                                    <div>
                                                      <div className="text-base font-semibold ${active ? "text-white" : "text-slate-950"}">${user.senderId}</div>
                                                      <div className=${`font-mono text-xs ${active ? "text-white/70" : "text-slate-500"}`}>${user.id || "no explicit user id"}</div>
                                                    </div>
                                                    <div className="flex flex-wrap gap-2">
                                                      ${active ? html`<${Chip} tone="ok">guide target</${Chip}>` : null}
                                                      <${Chip} tone=${user.enabled === false ? "danger" : "ok"}>
                                                        ${user.enabled === false ? "disabled" : "enabled"}
                                                      </${Chip}>
                                                      <${Chip}>${agentLabel}</${Chip}>
                                                    </div>
                                                  </div>
                                                  <div className="mt-3 flex flex-wrap gap-2 text-xs">
                                                    <span className=${`rounded-full px-3 py-1 ${active ? "bg-white/10 text-white/75" : "bg-white text-slate-500"}`}>Chat: ${user.chatId || "client controlled"}</span>
                                                    <span className=${`rounded-full px-3 py-1 ${active ? "bg-white/10 text-white/75" : "bg-white text-slate-500"}`}>Token param: ${selectedChannel.tokenParam || "token"}</span>
                                                  </div>
                                                  <code className=${`mt-4 block overflow-auto rounded-2xl px-3 py-3 font-mono text-xs leading-6 ${active ? "bg-white/10 text-white" : "bg-white text-slate-700"}`}>
                                                    ${user.token}
                                                  </code>
                                                  <div className="mt-4 flex flex-wrap gap-2">
                                                    <${Button} tone=${active ? "primary" : "secondary"} onClick=${() => {
                                                      setSelectedUserSenderId(user.senderId);
                                                      pushActivity(`Client guide switched to ${user.senderId}.`, "ok");
                                                      pushToast(`Client guide switched to ${user.senderId}.`, "ok");
                                                    }}>
                                                      ${active ? "In Guide" : "Use In Guide"}
                                                    </${Button}>
                                                    <${Button} tone="ghost" onClick=${() => handleCopy(`token for ${user.senderId}`, user.token)}>Copy Token</${Button}>
                                                    <${Button} tone="secondary" onClick=${() => startEditUser(user)}>Edit</${Button}>
                                                    <${Button} tone="danger" onClick=${() => removeUser(user)}>Delete</${Button}>
                                                  </div>
                                                </div>
                                              `;
                                            })}
                                          </div>
                                        `}
                                  </div>
                                </div>

                                <div className="grid gap-4">
                                  <div className="rounded-[26px] border border-slate-200 bg-white/80 p-5">
                                    <div className="mb-4 flex flex-wrap items-start justify-between gap-3">
                                      <div>
                                        <div className="text-xs font-semibold uppercase tracking-[0.18em] text-slate-400">Editor</div>
                                        <h3 className="mt-1 text-xl font-semibold text-slate-950">新增或编辑用户</h3>
                                        <p className="mt-2 text-sm leading-7 text-slate-500">
                                          表单默认隐藏，避免把页面变成一整片输入框。真正要编辑时再打开。
                                        </p>
                                      </div>
                                      <div className="flex flex-wrap gap-2">
                                        ${showUserEditor
                                          ? html`<${Button} tone="ghost" onClick=${() => {
                                              setShowUserEditor(false);
                                              setEditingUserSenderId("");
                                            }}>Hide Editor</${Button}>`
                                          : html`<${Button} tone="secondary" onClick=${startNewUser}>Open Editor</${Button}>`}
                                      </div>
                                    </div>

                                    ${showUserEditor
                                      ? html`
                                          <form className="grid gap-4" onSubmit=${submitUser}>
                                            <div className="grid gap-4 md:grid-cols-2">
                                              <label className="grid gap-2">
                                                <span className="text-sm font-medium text-slate-700">User ID</span>
                                                <input
                                                  className="rounded-2xl border-slate-200 bg-white px-4 py-3 text-sm"
                                                  autoComplete="off"
                                                  value=${userDraft.id}
                                                  onInput=${(event) => setUserDraft((current) => ({ ...current, id: event.target.value }))}
                                                  placeholder="optional stable id"
                                                />
                                              </label>
                                              <label className="grid gap-2">
                                                <span className="text-sm font-medium text-slate-700">Sender ID</span>
                                                <input
                                                  className="rounded-2xl border-slate-200 bg-white px-4 py-3 text-sm"
                                                  autoComplete="off"
                                                  value=${userDraft.senderId}
                                                  onInput=${(event) => setUserDraft((current) => ({ ...current, senderId: event.target.value }))}
                                                  placeholder="gc-test-user"
                                                  required
                                                />
                                              </label>
                                              <label className="grid gap-2">
                                                <span className="text-sm font-medium text-slate-700">Fixed Chat ID</span>
                                                <input
                                                  className="rounded-2xl border-slate-200 bg-white px-4 py-3 text-sm"
                                                  autoComplete="off"
                                                  value=${userDraft.chatId}
                                                  onInput=${(event) => setUserDraft((current) => ({ ...current, chatId: event.target.value }))}
                                                  placeholder="optional legacy binding"
                                                />
                                              </label>
                                              <label className="grid gap-2">
                                                <span className="text-sm font-medium text-slate-700">Token</span>
                                                <input
                                                  className="rounded-2xl border-slate-200 bg-white px-4 py-3 font-mono text-sm"
                                                  autoComplete="new-password"
                                                  value=${userDraft.token}
                                                  onInput=${(event) => setUserDraft((current) => ({ ...current, token: event.target.value }))}
                                                  placeholder="auto-generate if empty"
                                                />
                                              </label>
                                            </div>
                                            <label className="grid gap-2">
                                              <span className="text-sm font-medium text-slate-700">Allow Agents</span>
                                              <input
                                                className="rounded-2xl border-slate-200 bg-white px-4 py-3 text-sm"
                                                autoComplete="off"
                                                value=${userDraft.allowAgents}
                                                onInput=${(event) => setUserDraft((current) => ({ ...current, allowAgents: event.target.value }))}
                                                placeholder="main,code,writer"
                                              />
                                            </label>
                                            <label className="flex items-center gap-3 rounded-2xl border border-slate-200 bg-slate-50/70 px-4 py-3">
                                              <input
                                                type="checkbox"
                                                checked=${userDraft.enabled}
                                                onChange=${(event) => setUserDraft((current) => ({ ...current, enabled: event.target.checked }))}
                                              />
                                              <span className="text-sm font-medium text-slate-700">Enabled user</span>
                                            </label>
                                            <div className="flex flex-wrap gap-2">
                                              <${Button} type="submit">Save User</${Button}>
                                              <${Button} tone="secondary" onClick=${() => setUserDraft((current) => ({ ...current, token: `gc_${randomToken()}` }))}>Generate Token</${Button}>
                                              <${Button} tone="ghost" onClick=${() => {
                                                setEditingUserSenderId("");
                                                setUserDraft(createUserDraft());
                                              }}>Reset Form</${Button}>
                                            </div>
                                          </form>
                                        `
                                      : html`<${EmptyState}
                                          title="Editor hidden"
                                          text="平时先看用户列表，需要新增或修改时再打开编辑器。这样移动端不会被大量表单挤满。"
                                          action=${html`<${Button} onClick=${startNewUser}>Open User Editor</${Button}>`}
                                        />`}
                                  </div>
                                </div>
                              </div>
                            ` : null}

                            ${activeTab === TAB_SETTINGS ? html`
                              <div className="grid gap-4 2xl:grid-cols-[1fr_0.92fr]">
                                <div className="grid gap-4">
                                  <div className="rounded-[26px] border border-slate-200 bg-white/80 p-5">
                                    <div className="mb-4 flex flex-wrap items-start justify-between gap-3">
                                      <div>
                                        <div className="text-xs font-semibold uppercase tracking-[0.18em] text-slate-400">Server settings</div>
                                        <h3 className="mt-1 text-xl font-semibold text-slate-950">服务器配置</h3>
                                        <p className="mt-2 text-sm leading-7 text-slate-500">
                                          修改 channel 元数据、secret 和 tokenParam。这里是管理员操作，默认也保持收起，减少误操作。
                                        </p>
                                      </div>
                                      <div className="flex flex-wrap gap-2">
                                        ${showChannelEditor
                                          ? html`<${Button} tone="ghost" onClick=${() => setShowChannelEditor(false)}>Hide Editor</${Button}>`
                                          : html`<${Button} tone="secondary" onClick=${startEditServer}>Open Editor</${Button}>`}
                                      </div>
                                    </div>

                                    ${showChannelEditor
                                      ? html`
                                          <form className="grid gap-4" onSubmit=${submitChannel}>
                                            <label className="grid gap-2">
                                              <span className="text-sm font-medium text-slate-700">Channel ID</span>
                                              <input
                                                className="rounded-2xl border-slate-200 bg-white px-4 py-3 text-sm"
                                                autoComplete="off"
                                                value=${channelDraft.channelId}
                                                onInput=${(event) => setChannelDraft((current) => ({ ...current, channelId: event.target.value }))}
                                                placeholder="gc-relay-test"
                                                required
                                              />
                                            </label>
                                            <label className="grid gap-2">
                                              <span className="text-sm font-medium text-slate-700">Label</span>
                                              <input
                                                className="rounded-2xl border-slate-200 bg-white px-4 py-3 text-sm"
                                                autoComplete="off"
                                                value=${channelDraft.label}
                                                onInput=${(event) => setChannelDraft((current) => ({ ...current, label: event.target.value }))}
                                                placeholder="Singapore Main Gateway"
                                              />
                                            </label>
                                            <label className="grid gap-2">
                                              <span className="text-sm font-medium text-slate-700">Backend Secret</span>
                                              <input
                                                className="rounded-2xl border-slate-200 bg-white px-4 py-3 font-mono text-sm"
                                                autoComplete="new-password"
                                                value=${channelDraft.secret}
                                                onInput=${(event) => setChannelDraft((current) => ({ ...current, secret: event.target.value }))}
                                                placeholder="auto-generate if empty"
                                              />
                                            </label>
                                            <label className="grid gap-2">
                                              <span className="text-sm font-medium text-slate-700">Client Token Param</span>
                                              <input
                                                className="rounded-2xl border-slate-200 bg-white px-4 py-3 font-mono text-sm"
                                                autoComplete="off"
                                                value=${channelDraft.tokenParam}
                                                onInput=${(event) => setChannelDraft((current) => ({ ...current, tokenParam: event.target.value }))}
                                                placeholder="token"
                                              />
                                            </label>
                                            <div className="flex flex-wrap gap-2">
                                              <${Button} type="submit">Save Server</${Button}>
                                              <${Button} tone="secondary" onClick=${() => setChannelDraft((current) => ({ ...current, secret: randomToken() }))}>Generate Secret</${Button}>
                                              <${Button} tone="ghost" onClick=${() => handleCopy("backend secret", channelDraft.secret)} disabled=${!channelDraft.secret}>Copy Secret</${Button}>
                                            </div>
                                          </form>
                                        `
                                      : html`<${EmptyState}
                                          title="Editor hidden"
                                          text="配置区默认隐藏，减少日常浏览时的视觉噪音。要修改时再打开。"
                                          action=${html`<${Button} onClick=${startEditServer}>Open Server Editor</${Button}>`}
                                        />`}
                                  </div>

                                  <div className="rounded-[26px] border border-slate-200 bg-white/80 p-5">
                                    <div className="mb-4 space-y-1">
                                      <div className="text-xs font-semibold uppercase tracking-[0.18em] text-slate-400">Route preview</div>
                                      <h3 className="text-xl font-semibold text-slate-950">这个服务器现在的路由长什么样</h3>
                                      <p className="text-sm leading-7 text-slate-500">
                                        把“给谁看”的信息分开：公网入口给第三方，backend 地址只给插件机器。
                                      </p>
                                    </div>
                                    <div className="grid gap-3">
                                      <div className="rounded-[22px] border border-slate-200 bg-slate-50/80 p-4">
                                        <div className="text-sm font-semibold text-slate-900">Public client URL</div>
                                        <code className="mt-2 block overflow-auto rounded-2xl bg-white px-3 py-3 font-mono text-xs leading-6 text-slate-700">
                                          ${buildClientBaseUrl(gatewayState, workspaceChannel)}
                                        </code>
                                      </div>
                                      <div className="rounded-[22px] border border-slate-200 bg-slate-50/80 p-4">
                                        <div className="text-sm font-semibold text-slate-900">Plugin backend URL</div>
                                        <code className="mt-2 block overflow-auto rounded-2xl bg-white px-3 py-3 font-mono text-xs leading-6 text-slate-700">
                                          ${buildPluginBackendUrl(gatewayState)}
                                        </code>
                                      </div>
                                    </div>
                                  </div>
                                </div>

                                <div className="grid gap-4">
                                  ${selectedChannel ? html`
                                    <div className="rounded-[26px] border border-rose-200 bg-rose-50/70 p-5">
                                      <div className="mb-3 space-y-1">
                                        <div className="text-xs font-semibold uppercase tracking-[0.18em] text-rose-500">Danger zone</div>
                                        <h3 className="text-xl font-semibold text-rose-900">删除服务器</h3>
                                        <p className="text-sm leading-7 text-rose-800">
                                          删除会移除当前 channel、断开 backend，并清掉该服务器下的用户 token。
                                        </p>
                                      </div>
                                      <${Button} tone="danger" onClick=${() => removeChannel(selectedChannel)}>Delete ${selectedChannel.channelId}</${Button}>
                                    </div>
                                  ` : html`
                                    <div className="rounded-[26px] border border-amber-200 bg-amber-50/80 p-5">
                                      <div className="mb-3 space-y-1">
                                        <div className="text-xs font-semibold uppercase tracking-[0.18em] text-amber-600">Before saving</div>
                                        <h3 className="text-xl font-semibold text-amber-950">新服务器还没有落盘</h3>
                                        <p className="text-sm leading-7 text-amber-900">
                                          这是一个本地草稿。保存后它才会出现在左侧列表，并且才能开始配置用户 token 与第三方接入说明。
                                        </p>
                                      </div>
                                      <${Button} tone="ghost" onClick=${() => {
                                        setShowChannelEditor(false);
                                        setChannelDraft(createChannelDraft());
                                        setActiveTab(TAB_CONNECT);
                                      }}>Discard Draft</${Button}>
                                    </div>
                                  `}
                                </div>
                              </div>
                            ` : null}

                            ${activeTab === TAB_ACTIVITY ? html`
                              <div className="grid gap-4 md:grid-cols-2 xl:grid-cols-4">
                                ${checklist.map((item) => html`
                                  <div className="rounded-[24px] border border-slate-200 bg-white/80 p-4">
                                    <div className="flex items-center gap-2">
                                      <${Chip} tone=${item.ok ? "ok" : "warn"}>${item.ok ? "OK" : "TODO"}</${Chip}>
                                      <div className="text-sm font-semibold text-slate-900">${item.label}</div>
                                    </div>
                                    <div className="mt-3 text-sm leading-6 text-slate-500">${item.hint}</div>
                                  </div>
                                `)}
                              </div>
                            ` : null}
                          </div>
                        `
                      : html`<${EmptyState}
                          title="Select a server to start"
                          text="先从左边选择一个服务器。右边工作区会自动切换到它的接入配置、用户管理和设置。"
                          action=${html`<${Button} onClick=${startNewChannel}>Create New Server</${Button}>`}
                        />`}
                  </${SectionCard}>
                </div>
              </div>
            </div>

            <div className="pointer-events-none fixed inset-x-4 bottom-4 z-50 grid gap-2 sm:left-auto sm:right-5 sm:w-[320px]">
              ${toasts.map((toast) => html`
                <div
                  key=${toast.id}
                  className=${`rounded-2xl border px-4 py-3 text-sm shadow-float ${
                    toast.tone === "ok"
                      ? "border-emerald-200 bg-emerald-50 text-emerald-800"
                      : toast.tone === "warn"
                        ? "border-amber-200 bg-amber-50 text-amber-900"
                        : toast.tone === "danger"
                          ? "border-rose-200 bg-rose-50 text-rose-800"
                          : "border-slate-200 bg-white text-slate-700"
                  }`}
                >
                  ${toast.message}
                </div>
              `)}
            </div>
          </div>
        `;
      }

      createRoot(document.getElementById("app")).render(html`<${App} />`);
    </script>
  </body>
</html>

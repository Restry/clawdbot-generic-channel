<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Relay Gateway Admin</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: "#142132",
              sand: "#f6efe4",
              accent: "#0f766e",
              amberish: "#c56a18",
            },
            boxShadow: {
              float: "0 24px 60px rgba(20, 33, 50, 0.12)",
            },
            fontFamily: {
              sans: [
                "Avenir Next",
                "Segoe UI",
                "PingFang SC",
                "Hiragino Sans GB",
                "Microsoft YaHei",
                "sans-serif",
              ],
              mono: [
                "IBM Plex Mono",
                "JetBrains Mono",
                "SFMono-Regular",
                "ui-monospace",
                "monospace",
              ],
            },
          },
        },
      };
    </script>
    <style>
      body {
        background:
          radial-gradient(circle at 0 0, rgba(197, 106, 24, 0.18), transparent 26rem),
          radial-gradient(circle at 100% 0, rgba(15, 118, 110, 0.12), transparent 30rem),
          linear-gradient(180deg, #fbf7ef 0%, #f4ede3 100%);
      }
    </style>
  </head>
  <body class="min-h-screen text-ink antialiased">
    <div id="app"></div>

    <script type="module">
      import React, { useEffect, useState } from "https://esm.sh/react@19.2.0";
      import { createRoot } from "https://esm.sh/react-dom@19.2.0/client";
      import htm from "https://esm.sh/htm@3.1.1";

      const html = htm.bind(React.createElement);
      const STORAGE_KEY = "relay-admin-token";
      const DEFAULT_CHANNEL_FORM = {
        channelId: "",
        label: "",
        secret: "",
        tokenParam: "token",
      };
      const createDefaultUserForm = () => ({
        id: "",
        senderId: "",
        chatId: "",
        token: `gc_${randomToken()}`,
        allowAgents: "",
        enabled: true,
      });

      function randomToken() {
        if (globalThis.crypto?.randomUUID) {
          return globalThis.crypto.randomUUID().replaceAll("-", "");
        }
        if (globalThis.crypto?.getRandomValues) {
          const bytes = new Uint8Array(16);
          globalThis.crypto.getRandomValues(bytes);
          return Array.from(bytes, (byte) => byte.toString(16).padStart(2, "0")).join("");
        }
        return `${Date.now().toString(16)}${Math.random().toString(16).slice(2)}`
          .replaceAll(".", "")
          .slice(0, 32);
      }

      function formatTime(value) {
        if (!value) {
          return "Never";
        }
        try {
          return new Date(value).toLocaleString();
        } catch {
          return String(value);
        }
      }

      function getWsOrigin() {
        return `${window.location.protocol === "https:" ? "wss:" : "ws:"}//${window.location.host}`;
      }

      async function copyText(text) {
        if (!text) {
          throw new Error("Nothing to copy");
        }
        if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(text);
          return;
        }
        const input = document.createElement("textarea");
        input.value = text;
        input.setAttribute("readonly", "");
        input.style.position = "fixed";
        input.style.opacity = "0";
        document.body.appendChild(input);
        input.select();
        document.execCommand("copy");
        input.remove();
      }

      async function requestJson(path, adminToken, init = {}) {
        const headers = new Headers(init.headers || {});
        if (init.body && !headers.has("content-type")) {
          headers.set("content-type", "application/json");
        }
        if (adminToken) {
          headers.set("x-relay-admin-token", adminToken);
        }

        const response = await fetch(path, {
          ...init,
          headers,
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(data.error || `HTTP ${response.status}`);
        }
        return data;
      }

      function pickPreferredUser(channel, selectedUserSenderId) {
        const users = Array.isArray(channel?.users) ? channel.users : [];
        if (users.length === 0) {
          return null;
        }
        return (
          users.find((item) => item.senderId === selectedUserSenderId) ||
          users.find((item) => item.enabled !== false) ||
          users[0]
        );
      }

      function buildClientBaseUrl(channel) {
        return `${getWsOrigin()}/client?channelId=${encodeURIComponent(channel.channelId)}`;
      }

      function buildClientFullUrl(channel, user) {
        const tokenParam = channel.tokenParam || "token";
        const token = user?.token || "<user-token>";
        return `${buildClientBaseUrl(channel)}&${encodeURIComponent(tokenParam)}=${encodeURIComponent(token)}`;
      }

      function buildRelayBackendUrl() {
        return `${getWsOrigin()}/backend`;
      }

      function buildOpenClawConfig(channel) {
        return [
          "channels:",
          "  generic-channel:",
          "    enabled: true",
          '    connectionMode: "relay"',
          "    relay:",
          `      url: "${buildRelayBackendUrl()}"`,
          `      channelId: "${channel.channelId}"`,
          `      secret: "${channel.secret}"`,
          '      instanceId: "openclaw-node-1"',
          "    auth:",
          "      enabled: false",
        ].join("\n");
      }

      function buildRelayBlock(channel) {
        return [
          'connectionMode: "relay"',
          "relay:",
          `  url: "${buildRelayBackendUrl()}"`,
          `  channelId: "${channel.channelId}"`,
          `  secret: "${channel.secret}"`,
        ].join("\n");
      }

      function buildClientPreset(channel, user) {
        return {
          serverUrl: buildClientBaseUrl(channel),
          token: user?.token || "<create-user-token-first>",
          userName: user?.senderId || "your-user-name",
          chatId: user?.chatId || "<optional, can stay empty>",
          agentId:
            Array.isArray(user?.allowAgents) && user.allowAgents.length > 0
              ? user.allowAgents[0]
              : "main",
        };
      }

      function buildClientTemplate(channel, user) {
        const preset = buildClientPreset(channel, user);
        return [
          `serverUrl = "${preset.serverUrl}"`,
          `userName = "${preset.userName}"`,
          `token = "${preset.token}"`,
          "",
          "# optional",
          `chatId = "${preset.chatId}"`,
          `agentId = "${preset.agentId}"`,
        ].join("\n");
      }

      function buildClientGuide(channel, user) {
        const preset = buildClientPreset(channel, user);
        return [
          { key: "serverUrl", value: preset.serverUrl, note: "填到 H5 客户端的 serverUrl 输入框。这里建议只保留 channelId，token 单独填。"},
          { key: "token", value: preset.token, note: user ? `使用 ${user.senderId} 的网关 token。` : "先创建一个用户，再把它的 token 填到这里。"},
          { key: "userName", value: preset.userName, note: "通常与 senderId 一致，聊天里看到的发送者名称就是它。"},
          { key: "chatId", value: preset.chatId, note: "可留空。连接成功后，客户端还可以自由切换或新建多个会话。"},
          { key: "agentId", value: preset.agentId, note: "可选。如果该用户限制了 agent，首次连接建议先填一个允许的 agentId。"},
        ];
      }

      function badgeToneClass(tone) {
        if (tone === "ok") {
          return "bg-emerald-50 text-emerald-700 ring-emerald-200";
        }
        if (tone === "warn") {
          return "bg-amber-50 text-amber-700 ring-amber-200";
        }
        if (tone === "danger") {
          return "bg-rose-50 text-rose-700 ring-rose-200";
        }
        return "bg-slate-100 text-slate-600 ring-slate-200";
      }

      function Button({ tone = "primary", className = "", type = "button", ...props }) {
        const toneClass =
          tone === "primary"
            ? "bg-amber-400 text-slate-950 hover:bg-amber-300"
            : tone === "danger"
              ? "bg-rose-50 text-rose-700 ring-1 ring-inset ring-rose-200 hover:bg-rose-100"
              : tone === "ghost"
                ? "bg-white/70 text-slate-700 ring-1 ring-inset ring-slate-200 hover:bg-white"
                : "bg-white text-slate-800 ring-1 ring-inset ring-slate-200 hover:bg-slate-50";

        return html`
          <button
            ...${props}
            type=${type}
            className=${`inline-flex items-center justify-center rounded-2xl px-4 py-2.5 text-sm font-semibold transition ${toneClass} ${className}`.trim()}
          />
        `;
      }

      function Badge({ tone = "slate", children }) {
        return html`
          <span className=${`inline-flex items-center rounded-full px-3 py-1 text-xs font-semibold ring-1 ring-inset ${badgeToneClass(tone)}`}>
            ${children}
          </span>
        `;
      }

      function Panel({ title, subtitle, actions = null, children, className = "" }) {
        return html`
          <section className=${`rounded-[28px] border border-white/70 bg-white/80 p-5 shadow-float backdrop-blur ${className}`.trim()}>
            <div className="mb-4 flex flex-wrap items-start justify-between gap-3">
              <div className="space-y-1">
                <h2 className="text-lg font-semibold text-slate-900">${title}</h2>
                ${subtitle ? html`<p className="text-sm leading-6 text-slate-500">${subtitle}</p>` : null}
              </div>
              ${actions}
            </div>
            ${children}
          </section>
        `;
      }

      function EmptyState({ title, text }) {
        return html`
          <div className="grid min-h-[220px] place-items-center rounded-[24px] border border-dashed border-slate-200 bg-white/50 px-6 py-10 text-center">
            <div className="space-y-3">
              <div className="text-xl font-semibold text-slate-900">${title}</div>
              <p className="max-w-md text-sm leading-6 text-slate-500">${text}</p>
            </div>
          </div>
        `;
      }

      function App() {
        const [adminToken, setAdminToken] = useState(localStorage.getItem(STORAGE_KEY) || "");
        const [adminInput, setAdminInput] = useState(localStorage.getItem(STORAGE_KEY) || "");
        const [tokenVisible, setTokenVisible] = useState(false);
        const [gatewayState, setGatewayState] = useState(null);
        const [selectedChannelId, setSelectedChannelId] = useState("");
        const [selectedUserSenderId, setSelectedUserSenderId] = useState("");
        const [serverQuery, setServerQuery] = useState("");
        const [userQuery, setUserQuery] = useState("");
        const [channelForm, setChannelForm] = useState(DEFAULT_CHANNEL_FORM);
        const [userForm, setUserForm] = useState(createDefaultUserForm());
        const [isLoading, setIsLoading] = useState(false);
        const [errorMessage, setErrorMessage] = useState("");
        const [activity, setActivity] = useState([]);
        const [toasts, setToasts] = useState([]);

        const channels = Array.isArray(gatewayState?.channels) ? gatewayState.channels : [];
        const selectedChannel = channels.find((item) => item.channelId === selectedChannelId) || null;
        const filteredChannels = channels
          .filter((item) => {
            const query = serverQuery.trim().toLowerCase();
            if (!query) {
              return true;
            }
            return [item.channelId, item.label, item.backendConnected ? "online" : "offline", item.userCount > 0 ? "protected" : "open", item.instanceId]
              .filter(Boolean)
              .join(" ")
              .toLowerCase()
              .includes(query);
          })
          .sort((left, right) => {
            if (left.channelId === selectedChannelId) {
              return -1;
            }
            if (right.channelId === selectedChannelId) {
              return 1;
            }
            if (left.backendConnected !== right.backendConnected) {
              return left.backendConnected ? -1 : 1;
            }
            return (left.label || left.channelId).localeCompare(right.label || right.channelId);
          });
        const preferredUser = pickPreferredUser(selectedChannel, selectedUserSenderId);
        const visibleUsers = (Array.isArray(selectedChannel?.users) ? selectedChannel.users : [])
          .filter((item) => {
            const query = userQuery.trim().toLowerCase();
            if (!query) {
              return true;
            }
            return [item.senderId, item.id, item.chatId, item.token, Array.isArray(item.allowAgents) ? item.allowAgents.join(",") : "", item.enabled === false ? "disabled" : "enabled"]
              .filter(Boolean)
              .join(" ")
              .toLowerCase()
              .includes(query);
          })
          .sort((left, right) => {
            if ((left.enabled === false) !== (right.enabled === false)) {
              return left.enabled === false ? 1 : -1;
            }
            return left.senderId.localeCompare(right.senderId);
          });
        const summary = {
          channelCount: channels.length,
          protectedCount: channels.filter((item) => item.userCount > 0).length,
          backendCount: gatewayState?.stats?.backendCount || 0,
          offlineCount: channels.filter((item) => !item.backendConnected).length,
          clientCount: gatewayState?.stats?.clientCount || 0,
          userCount: channels.reduce((sum, item) => sum + (item.userCount || 0), 0),
        };
        const nextStep = !selectedChannel
          ? "先选择一个服务器，或者新建一个 channel。"
          : selectedChannel.userCount === 0
            ? "先创建至少一个用户 token，避免任何拿到入口的人都能连接。"
            : !selectedChannel.backendConnected
              ? "把右侧 OpenClaw 配置写到插件机器上，确保插件以 relay 模式连回网关。"
              : selectedChannel.tokenParam !== "token"
                ? "如果你要直接用官方 H5 示例页，建议把 tokenParam 改回 token。"
                : "配置已经比较完整，接下来把客户端字段说明交给接入方即可。";

        useEffect(() => {
          if (!channels.length) {
            if (selectedChannelId) {
              setSelectedChannelId("");
            }
            return;
          }
          if (selectedChannel) {
            const user = pickPreferredUser(selectedChannel, selectedUserSenderId);
            if ((user?.senderId || "") !== selectedUserSenderId) {
              setSelectedUserSenderId(user?.senderId || "");
            }
          }
        }, [channels, selectedChannelId, selectedUserSenderId, selectedChannel]);

        useEffect(() => {
          if (!selectedChannel) {
            return;
          }
          setChannelForm({
            channelId: selectedChannel.channelId || "",
            label: selectedChannel.label || "",
            secret: selectedChannel.secret || "",
            tokenParam: selectedChannel.tokenParam || "token",
          });
        }, [selectedChannelId, gatewayState?.timestamp]);

        useEffect(() => {
          if (!adminToken) {
            loadState(false);
            return;
          }
          loadState(false);
        }, []);

        function addActivity(message, tone = "slate") {
          setActivity((current) => [
            { id: `${Date.now()}-${Math.random()}`, message, tone, time: Date.now() },
            ...current,
          ].slice(0, 10));
        }

        function showToast(message, tone = "slate") {
          const id = `${Date.now()}-${Math.random()}`;
          setToasts((current) => [...current, { id, message, tone }]);
          window.setTimeout(() => {
            setToasts((current) => current.filter((item) => item.id !== id));
          }, 2600);
        }

        async function runAction(work, successMessage, errorPrefix = "Request failed") {
          try {
            setErrorMessage("");
            const result = await work();
            if (successMessage) {
              addActivity(successMessage, "ok");
              showToast(successMessage, "ok");
            }
            return result;
          } catch (error) {
            const message = `${errorPrefix}: ${String(error.message || error)}`;
            setErrorMessage(message);
            addActivity(message, "danger");
            showToast(message, "danger");
            throw error;
          }
        }

        async function loadState(announce = true, tokenOverride = undefined) {
          const activeToken = tokenOverride ?? adminToken;
          setIsLoading(true);
          try {
            const data = await requestJson("/api/state", activeToken);
            setGatewayState(data);
            const nextChannels = Array.isArray(data.channels) ? data.channels : [];
            setSelectedChannelId((current) => {
              if (current && nextChannels.some((item) => item.channelId === current)) {
                return current;
              }
              return nextChannels[0]?.channelId || "";
            });
            setErrorMessage("");
            if (announce) {
              addActivity("Relay state refreshed.", "ok");
              showToast("Relay state refreshed.", "ok");
            }
          } catch (error) {
            const message = String(error.message || error);
            if (message.includes("admin auth required")) {
              setGatewayState(null);
              setErrorMessage("Admin token required");
              if (announce) {
                addActivity("Admin token required before state can be loaded.", "warn");
                showToast("Admin token required.", "warn");
              }
              return;
            }
            setErrorMessage(message);
            if (announce) {
              addActivity(message, "danger");
              showToast(message, "danger");
            }
          } finally {
            setIsLoading(false);
          }
        }

        async function saveAdminToken(event) {
          event.preventDefault();
          const nextToken = adminInput.trim();
          localStorage.setItem(STORAGE_KEY, nextToken);
          setAdminToken(nextToken);
          addActivity("Admin token saved locally.", "ok");
          showToast("Admin token saved locally.", "ok");
          await loadState(false, nextToken);
        }

        function prepareNewChannel() {
          setSelectedChannelId("");
          setChannelForm(DEFAULT_CHANNEL_FORM);
          setUserForm(createDefaultUserForm());
          addActivity("Server form reset for a new channel.", "ok");
          showToast("Server form reset for a new channel.", "ok");
        }

        function startEditingUser(user) {
          setSelectedUserSenderId(user.senderId);
          setUserForm({
            id: user.id || "",
            senderId: user.senderId || "",
            chatId: user.chatId || "",
            token: user.token || `gc_${randomToken()}`,
            allowAgents: Array.isArray(user.allowAgents) ? user.allowAgents.join(",") : "",
            enabled: user.enabled === false ? false : true,
          });
          addActivity(`Loaded ${user.senderId} into user form.`, "ok");
          showToast(`Loaded ${user.senderId} into user form.`, "ok");
        }

        async function submitChannel(event) {
          event.preventDefault();
          const payload = {
            channelId: channelForm.channelId.trim(),
            label: channelForm.label.trim(),
            secret: channelForm.secret.trim(),
            tokenParam: channelForm.tokenParam.trim() || "token",
          };
          if (!payload.channelId) {
            setErrorMessage("channelId is required");
            showToast("channelId is required", "danger");
            return;
          }
          await runAction(
            async () => {
              await requestJson("/api/channels", adminToken, {
                method: "POST",
                body: JSON.stringify(payload),
              });
              await loadState(false);
              setSelectedChannelId(payload.channelId);
            },
            `Saved server ${payload.channelId}.`,
            "Failed to save server",
          );
        }

        async function submitUser(event) {
          event.preventDefault();
          if (!selectedChannel) {
            setErrorMessage("Select a server before saving users");
            showToast("Select a server before saving users.", "warn");
            return;
          }
          const payload = {
            id: userForm.id.trim(),
            senderId: userForm.senderId.trim(),
            chatId: userForm.chatId.trim(),
            token: userForm.token.trim(),
            allowAgents: userForm.allowAgents.trim(),
            enabled: userForm.enabled,
          };
          if (!payload.senderId) {
            setErrorMessage("senderId is required");
            showToast("senderId is required", "danger");
            return;
          }
          await runAction(
            async () => {
              await requestJson(`/api/channels/${encodeURIComponent(selectedChannel.channelId)}/users`, adminToken, {
                method: "POST",
                body: JSON.stringify(payload),
              });
              await loadState(false);
              setSelectedUserSenderId(payload.senderId);
              setUserForm(createDefaultUserForm());
            },
            `Saved user ${payload.senderId}.`,
            "Failed to save user",
          );
        }

        async function deleteChannel(channel) {
          if (!window.confirm(`Delete channel ${channel.channelId}?`)) {
            return;
          }
          await runAction(
            async () => {
              await requestJson(`/api/channels/${encodeURIComponent(channel.channelId)}`, adminToken, {
                method: "DELETE",
              });
              if (selectedChannelId === channel.channelId) {
                setSelectedChannelId("");
              }
              await loadState(false);
            },
            `Deleted channel ${channel.channelId}.`,
            "Failed to delete channel",
          );
        }

        async function deleteUser(user) {
          if (!selectedChannel) {
            return;
          }
          if (!window.confirm(`Delete user ${user.senderId}?`)) {
            return;
          }
          await runAction(
            async () => {
              await requestJson(
                `/api/channels/${encodeURIComponent(selectedChannel.channelId)}/users/${encodeURIComponent(user.senderId)}`,
                adminToken,
                { method: "DELETE" },
              );
              await loadState(false);
            },
            `Deleted user ${user.senderId}.`,
            "Failed to delete user",
          );
        }

        async function handleCopy(label, value) {
          await runAction(
            async () => {
              await copyText(value);
            },
            `Copied ${label}.`,
            `Failed to copy ${label}`,
          );
        }

        return html`
          <div className="mx-auto max-w-[1500px] px-4 py-6 md:px-6 md:py-8">
            <div className="grid gap-6">
              <section className="grid gap-4 lg:grid-cols-[1.35fr_0.9fr]">
                <div className="rounded-[32px] border border-white/70 bg-white/80 p-6 shadow-float backdrop-blur">
                  <div className="mb-6 inline-flex rounded-full bg-emerald-50 px-3 py-1 text-xs font-semibold uppercase tracking-[0.2em] text-emerald-700 ring-1 ring-inset ring-emerald-200">
                    Relay Gateway Control Room
                  </div>
                  <div className="grid gap-6">
                    <div className="space-y-3">
                      <h1 className="max-w-3xl text-3xl font-semibold leading-tight text-slate-950 md:text-5xl">
                        把网关运维和第三方接入说明放到一张页面里。
                      </h1>
                      <p className="max-w-3xl text-sm leading-7 text-slate-500 md:text-base">
                        这个页面现在分成明确的几个阶段：先登录，再选择服务器，然后拿到插件配置和客户端字段说明，最后管理用户 token。主次分层清楚，接入方和运维方都能直接照着填。
                      </p>
                    </div>

                    <div className="grid gap-3 md:grid-cols-4">
                      <div className="rounded-[24px] border border-slate-200 bg-white/70 p-4">
                        <div className="text-xs font-semibold uppercase tracking-[0.16em] text-slate-400">Channels</div>
                        <div className="mt-2 text-3xl font-semibold text-slate-950">${summary.channelCount}</div>
                        <div className="mt-2 text-sm text-slate-500">${summary.protectedCount} protected</div>
                      </div>
                      <div className="rounded-[24px] border border-slate-200 bg-white/70 p-4">
                        <div className="text-xs font-semibold uppercase tracking-[0.16em] text-slate-400">Backends Online</div>
                        <div className="mt-2 text-3xl font-semibold text-slate-950">${summary.backendCount}</div>
                        <div className="mt-2 text-sm text-slate-500">${summary.offlineCount} offline</div>
                      </div>
                      <div className="rounded-[24px] border border-slate-200 bg-white/70 p-4">
                        <div className="text-xs font-semibold uppercase tracking-[0.16em] text-slate-400">Clients Connected</div>
                        <div className="mt-2 text-3xl font-semibold text-slate-950">${summary.clientCount}</div>
                        <div className="mt-2 text-sm text-slate-500">
                          ${summary.clientCount > 0 ? "Relay traffic is live" : "No live client sessions"}
                        </div>
                      </div>
                      <div className="rounded-[24px] border border-slate-200 bg-white/70 p-4">
                        <div className="text-xs font-semibold uppercase tracking-[0.16em] text-slate-400">Managed Users</div>
                        <div className="mt-2 text-3xl font-semibold text-slate-950">${summary.userCount}</div>
                        <div className="mt-2 truncate text-sm text-slate-500">
                          ${gatewayState?.configPath || "Config path unavailable"}
                        </div>
                      </div>
                    </div>

                    <div className="rounded-[28px] border border-slate-200 bg-white/75 p-4">
                      <div className="flex flex-wrap items-center gap-2">
                        <${Badge} tone=${errorMessage ? "warn" : "ok"}>${errorMessage ? "Attention" : "Ready"}</${Badge}>

                      subtitle="给每个调用方一个用户和 token。这里的用户存在于网关，不要求插件本地再配一份 auth.users。"
                    >
                      ${selectedChannel && selectedChannel.userCount === 0
                        ? html`
                            <div className="mb-4 rounded-[24px] border border-amber-200 bg-amber-50/90 p-4 text-sm leading-7 text-amber-900">
                              当前服务器还没有任何用户。只要有人知道入口地址，就可能尝试连上来。
                            </div>
                          `
                        : null}

                      <form className="grid gap-4" onSubmit=${submitUser}>
                        <div className="grid gap-4 md:grid-cols-2">
                          <label className="grid gap-2">
                            <span className="text-sm font-medium text-slate-700">User ID</span>
                            <input
                              className="rounded-2xl border-slate-200 bg-white px-4 py-3 text-sm"
                              autoComplete="off"
                              value=${userForm.id}
                              onInput=${(event) => setUserForm((current) => ({ ...current, id: event.target.value }))}
                              placeholder="optional stable id"
                            />
                          </label>
                          <label className="grid gap-2">
                            <span className="text-sm font-medium text-slate-700">Sender ID</span>
                            <input
                              className="rounded-2xl border-slate-200 bg-white px-4 py-3 text-sm"
                              autoComplete="off"
                              value=${userForm.senderId}
                              onInput=${(event) => setUserForm((current) => ({ ...current, senderId: event.target.value }))}
                              placeholder="gc-test-user"
                              required
                            />
                          </label>
                          <label className="grid gap-2">
                            <span className="text-sm font-medium text-slate-700">Fixed Chat ID</span>
                            <input
                              className="rounded-2xl border-slate-200 bg-white px-4 py-3 text-sm"
                              autoComplete="off"
                              value=${userForm.chatId}
                              onInput=${(event) => setUserForm((current) => ({ ...current, chatId: event.target.value }))}
                              placeholder="optional legacy binding"
                            />
                          </label>
                          <label className="grid gap-2">
                            <span className="text-sm font-medium text-slate-700">Token</span>
                            <input
                              className="rounded-2xl border-slate-200 bg-white px-4 py-3 font-mono text-sm"
                              autoComplete="new-password"
                              value=${userForm.token}
                              onInput=${(event) => setUserForm((current) => ({ ...current, token: event.target.value }))}
                              placeholder="auto-generate if empty"
                            />
                          </label>
                        </div>

                        <label className="grid gap-2">
                          <span className="text-sm font-medium text-slate-700">Allow Agents</span>
                          <input
                            className="rounded-2xl border-slate-200 bg-white px-4 py-3 text-sm"
                            autoComplete="off"
                            value=${userForm.allowAgents}
                            onInput=${(event) => setUserForm((current) => ({ ...current, allowAgents: event.target.value }))}
                            placeholder="main,code,writer"
                          />
                        </label>

                        <label className="flex items-center gap-3 rounded-2xl border border-slate-200 bg-slate-50/70 px-4 py-3">
                          <input
                            type="checkbox"
                            checked=${userForm.enabled}
                            onChange=${(event) => setUserForm((current) => ({ ...current, enabled: event.target.checked }))}
                          />
                          <span className="text-sm font-medium text-slate-700">Enabled user</span>
                        </label>

                        <div className="flex flex-wrap gap-2">
                          <${Button} type="submit" disabled=${!selectedChannel}>Save User</${Button}>
                          <${Button}
                            tone="secondary"
                            onClick=${() => setUserForm((current) => ({ ...current, token: `gc_${randomToken()}` }))}
                          >
                            Generate Token
                          </${Button}>
                          <${Button}
                            tone="ghost"
                            onClick=${() => setUserForm(createDefaultUserForm())}
                          >
                            New User Draft
                          </${Button}>
                        </div>
                      </form>

                      <div className="mt-6 space-y-4 border-t border-slate-200 pt-6">
                        <div className="flex flex-wrap items-end justify-between gap-3">
                          <div>
                            <div className="text-base font-semibold text-slate-900">Configured users</div>
                            <div className="mt-1 text-sm leading-6 text-slate-500">
                              选中某个用户后，右上“客户端字段说明”会自动切换成它的 token 和 agent。
                            </div>
                          </div>
                          <input
                            className="w-full max-w-xs rounded-2xl border-slate-200 bg-white px-4 py-3 text-sm"
                            type="search"
                            value=${userQuery}
                            onInput=${(event) => setUserQuery(event.target.value)}
                            placeholder="Search by senderId, token, chatId..."
                          />
                        </div>

                        ${!selectedChannel
                          ? html`<${EmptyState} title="No server selected" text="Select a server first, then create or manage its users." />`
                          : visibleUsers.length === 0
                            ? html`<${EmptyState} title="No users found" text=${selectedChannel.userCount === 0 ? "Create the first token for this server." : "Try a shorter search keyword."} />`
                            : html`
                                <div className="grid gap-3">
                                  ${visibleUsers.map((user) => {
                                    const active = preferredUser?.senderId === user.senderId;
                                    return html`
                                      <article className=${`rounded-[24px] border p-4 ${
                                        active ? "border-emerald-300 bg-emerald-50/70" : "border-slate-200 bg-white/80"
                                      }`}>
                                        <div className="flex flex-wrap items-start justify-between gap-3">
                                          <div>
                                            <div className="text-base font-semibold text-slate-900">${user.senderId}</div>
                                            <div className="font-mono text-xs text-slate-500">${user.id || "no explicit user id"}</div>
                                          </div>
                                          <div className="flex flex-wrap gap-2">
                                            ${active ? html`<${Badge} tone="ok">client preset</${Badge}>` : null}
                                            <${Badge} tone=${user.enabled === false ? "danger" : "ok"}>
                                              ${user.enabled === false ? "disabled" : "enabled"}
                                            </${Badge}>
                                            <${Badge}>
                                              ${Array.isArray(user.allowAgents) && user.allowAgents.length ? user.allowAgents.join(", ") : "all agents"}
                                            </${Badge}>
                                          </div>
                                        </div>

                                        <div className="mt-3 flex flex-wrap gap-2 text-xs text-slate-500">
                                          <span className="rounded-full bg-slate-100 px-3 py-1">
                                            Chat: ${user.chatId || "client controlled"}
                                          </span>
                                          <span className="rounded-full bg-slate-100 px-3 py-1">
                                            Token param: ${selectedChannel.tokenParam || "token"}
                                          </span>
                                        </div>

                                        <div className="mt-4 rounded-[20px] bg-slate-950 px-4 py-3 font-mono text-xs leading-6 text-slate-100">
                                          ${user.token}
                                        </div>

                                        <div className="mt-4 flex flex-wrap gap-2">
                                          <${Button}
                                            tone=${active ? "primary" : "secondary"}
                                            onClick=${() => {
                                              setSelectedUserSenderId(user.senderId);
                                              addActivity(`Client guide switched to ${user.senderId}.`, "ok");
                                              showToast(`Client guide switched to ${user.senderId}.`, "ok");
                                            }}
                                          >
                                            ${active ? "In Guide" : "Use In Guide"}
                                          </${Button}>
                                          <${Button}
                                            tone="ghost"
                                            onClick=${() => handleCopy(`token for ${user.senderId}`, user.token)}
                                          >
                                            Copy Token
                                          </${Button}>
                                          <${Button} tone="secondary" onClick=${() => startEditingUser(user)}>Edit</${Button}>
                                          <${Button} tone="danger" onClick=${() => deleteUser(user)}>Delete</${Button}>
                                        </div>
                                      </article>
                                    `;
                                  })}
                                </div>
                              `}
                      </div>
                    </${Panel}>
                  </div>
                </div>
              </section>
            </div>

            <div className="pointer-events-none fixed bottom-4 right-4 z-50 grid gap-2 md:bottom-6 md:right-6">
              ${toasts.map((toast) => html`
                <div
                  key=${toast.id}
                  className=${`min-w-[240px] rounded-2xl border px-4 py-3 text-sm shadow-float ${
                    toast.tone === "ok"
                      ? "border-emerald-200 bg-emerald-50 text-emerald-800"
                      : toast.tone === "warn"
                        ? "border-amber-200 bg-amber-50 text-amber-900"
                        : toast.tone === "danger"
                          ? "border-rose-200 bg-rose-50 text-rose-800"
                          : "border-slate-200 bg-white text-slate-700"
                  }`}
                >
                  ${toast.message}
                </div>
              `)}
            </div>
          </div>
        `;
      }

      createRoot(document.getElementById("app")).render(html`<${App} />`);
    </script>
  </body>
</html>
